<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wkty18 — Projects</title>
<style>
/* ════════════════════════════════════════
   DESIGN TOKENS — v0 / shadcn-inspired
   ════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Colors ── */
  --background: #fafaf9;
  --foreground: #1c1917;
  --card: #ffffff;
  --card-foreground: #1c1917;
  --primary: #1c1917;
  --primary-foreground: #fafaf9;
  --secondary: #f5f5f4;
  --secondary-foreground: #1c1917;
  --muted: #f5f5f4;
  --muted-foreground: #78716c;
  --accent: #fb7299;
  --accent-foreground: #ffffff;
  --border: #e7e5e4;
  --ring: #1c1917;
  --destructive: #ef4444;

  /* ── Typography ── */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
  --text-xs: 0.75rem;    /* 12px */
  --text-sm: 0.8125rem;  /* 13px */
  --text-base: 0.9375rem;/* 15px */
  --text-lg: 1.125rem;   /* 18px */
  --text-xl: 1.5rem;     /* 24px */
  --text-2xl: 2rem;      /* 32px */
  --leading-relaxed: 1.6;
  --leading-normal: 1.5;
  --leading-tight: 1.25;

  /* ── Spacing (4px grid) ── */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;

  /* ── Radius ── */
  --radius: 0.625rem;
  --radius-sm: calc(var(--radius) - 0.25rem);
  --radius-md: var(--radius);
  --radius-lg: calc(var(--radius) + 0.25rem);
  --radius-xl: calc(var(--radius) + 0.5rem);
  --radius-2xl: 1rem;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 32px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.03);
  --shadow-xl: 0 20px 48px rgba(0,0,0,0.08), 0 8px 16px rgba(0,0,0,0.04);
  --shadow-2xl: 0 32px 64px rgba(0,0,0,0.1);

  /* ── Transitions ── */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 500ms;
}

/* ════════════════════════════════════════
   BASE
   ════════════════════════════════════════ */
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  color: var(--foreground);
  background: var(--background);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
  overflow-x: hidden;
}

/* Subtle noise texture overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* ════════════════════════════════════════
   SCROLL PROGRESS
   ════════════════════════════════════════ */
.scroll-progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), #f472b6, var(--accent));
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
  z-index: 1000;
  transition: width 0.1s linear;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ════════════════════════════════════════
   HEADER — Bilibili-style profile
   ════════════════════════════════════════ */
.header {
  position: relative; z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: var(--space-16) var(--space-6) var(--space-8);
  text-align: center;
}

/* Avatar group */
.avatar-group {
  position: relative;
  display: inline-block;
  margin-bottom: var(--space-5);
}

.avatar-ring {
  position: absolute; inset: -6px;
  border-radius: var(--radius-full);
  border: 2px dashed var(--border);
  animation: ringSpin 20s linear infinite;
}
.avatar-group:hover .avatar-ring {
  animation-duration: 10s;
  border-color: var(--accent);
}

@keyframes ringSpin { to { transform: rotate(360deg); } }

.avatar {
  width: 72px; height: 72px;
  border-radius: var(--radius-full);
  background: var(--primary);
  color: var(--primary-foreground);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700;
  position: relative; z-index: 1;
  box-shadow: var(--shadow-md);
  transition: transform var(--duration-normal) var(--ease-spring),
              box-shadow var(--duration-normal) var(--ease-out);
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}
.avatar:hover {
  transform: scale(1.08);
  box-shadow: var(--shadow-lg);
}
.avatar:active { transform: scale(0.92); }

/* Level badge (Bilibili-style) */
.level-badge {
  position: absolute; bottom: -2px; right: -4px;
  z-index: 2;
  width: 26px; height: 26px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--accent), #f472b6);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  font-family: var(--font-mono);
  box-shadow: 0 2px 8px rgba(251,114,153,0.4);
  animation: badgeGlow 2s ease-in-out infinite;
  border: 2px solid #fff;
}

@keyframes badgeGlow {
  0%, 100% { box-shadow: 0 2px 8px rgba(251,114,153,0.4); }
  50% { box-shadow: 0 2px 16px rgba(251,114,153,0.6); }
}

.header h1 {
  font-size: var(--text-2xl);
  font-weight: 700;
  letter-spacing: -0.6px;
  line-height: 1.2;
}

.header .subtitle {
  margin-top: var(--space-2);
  color: var(--muted-foreground);
  font-size: var(--text-base);
}

/* ──── Stats Bar ──── */
.stats-bar {
  display: flex; justify-content: center; gap: var(--space-1);
  margin-top: var(--space-6);
  flex-wrap: wrap;
}

.stat-card {
  flex: 0 1 130px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-4);
  text-align: center;
  transition: all var(--duration-normal) var(--ease-out);
  cursor: default;
  box-shadow: var(--shadow-xs);
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: #d4d4d4;
}

.stat-value {
  font-size: var(--text-xl);
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -0.5px;
  color: var(--foreground);
}

.stat-label {
  font-size: var(--text-xs);
  color: var(--muted-foreground);
  margin-top: var(--space-1);
}

/* ════════════════════════════════════════
   SEARCH + FILTER (Sticky)
   ════════════════════════════════════════ */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--background);
  padding: var(--space-6) var(--space-6);
  transition: box-shadow var(--duration-normal) var(--ease-out);
}
.toolbar.scrolled {
  box-shadow: var(--shadow-sm);
  background: rgba(250,250,249,0.85);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
}

.toolbar-inner {
  max-width: 680px;
  margin: 0 auto;
  display: flex; flex-direction: column; gap: var(--space-4);
}

/* Search */
.search-wrap {
  position: relative;
}

.search-box {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-3) var(--space-5);
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--card);
  transition: all var(--duration-normal) var(--ease-out);
  box-shadow: var(--shadow-xs);
}
.search-box:focus-within {
  border-color: #c0bfbc;
  box-shadow: var(--shadow-md), 0 0 0 3px rgba(28,25,23,0.04);
  transform: translateY(-1px);
}

.search-icon {
  font-size: 15px;
  opacity: 0.35;
  transition: opacity var(--duration-fast) var(--ease-out);
}
.search-box:focus-within .search-icon { opacity: 0.65; }

.search-input {
  flex: 1; border: none; outline: none;
  font-size: var(--text-base); font-family: inherit;
  color: var(--foreground); background: transparent;
  min-width: 0;
}
.search-input::placeholder { color: #a8a29e; }

.search-clear {
  width: 24px; height: 24px;
  border-radius: var(--radius-full); border: none;
  background: var(--secondary);
  color: var(--muted-foreground);
  font-size: 12px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  transition: all var(--duration-fast) var(--ease-out);
  flex-shrink: 0;
}
.search-clear.visible { display: flex; }
.search-clear:hover { background: #e7e5e4; color: var(--foreground); }

.search-shortcut {
  font-size: var(--text-xs);
  color: #a8a29e;
  background: var(--secondary);
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ──── Filter Tabs (Bilibili-style underline) ──── */
.filter-tabs {
  display: flex; gap: var(--space-1);
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }

.filter-tab {
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: 500;
  font-family: inherit;
  color: var(--muted-foreground);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  white-space: nowrap;
  position: relative;
}
.filter-tab:hover { color: var(--foreground); }
.filter-tab.active {
  color: var(--foreground);
  border-bottom-color: var(--foreground);
}
.filter-tab:active { transform: scale(0.95); }

.filter-count {
  font-size: var(--text-xs);
  color: var(--muted-foreground);
  margin-left: 2px;
}

/* ════════════════════════════════════════
   PROJECT GRID
   ════════════════════════════════════════ */
.grid {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: var(--space-4);
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 var(--space-6) var(--space-20);
}

/* ════════════════════════════════════════
   CARD — Bilibili video-card inspired
   ════════════════════════════════════════ */
.card {
  position: relative;
  display: flex; flex-direction: column;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow-sm);
  transition: transform var(--duration-normal) var(--ease-out),
              box-shadow var(--duration-normal) var(--ease-out),
              border-color var(--duration-normal) var(--ease-out);
  will-change: transform;
}

/* Card cover area (Bilibili video thumbnail equivalent) */
.card-cover {
  position: relative;
  aspect-ratio: 16 / 9;
  background: var(--secondary);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

.card-cover-icon {
  font-size: 52px;
  transition: transform var(--duration-slow) var(--ease-spring);
  position: relative; z-index: 1;
}
.card:hover .card-cover-icon {
  transform: scale(1.2) rotate(-8deg);
}

/* Play button overlay (Bilibili-style) */
.card-play-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  transition: background var(--duration-normal) var(--ease-out);
  z-index: 2;
}
.card:hover .card-play-overlay { background: rgba(0,0,0,0.04); }

.card-play-btn {
  width: 52px; height: 52px;
  border-radius: var(--radius-full);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  opacity: 0;
  transform: scale(0.8);
  transition: all var(--duration-normal) var(--ease-spring);
  box-shadow: var(--shadow-lg);
  color: var(--foreground);
}
.card:hover .card-play-btn {
  opacity: 1;
  transform: scale(1);
}

/* Card body */
.card-body {
  padding: var(--space-5) var(--space-5) var(--space-4);
  flex: 1;
  display: flex; flex-direction: column;
}

.card-title {
  font-size: var(--text-lg);
  font-weight: 600;
  letter-spacing: -0.3px;
  line-height: var(--leading-tight);
  margin-bottom: var(--space-1);
  transition: color var(--duration-fast) var(--ease-out);
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card:hover .card-title { color: #000; }

.card-desc {
  font-size: var(--text-sm);
  color: var(--muted-foreground);
  line-height: var(--leading-relaxed);
  margin-bottom: var(--space-3);
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex; gap: var(--space-1);
  flex-wrap: wrap;
}

.tag {
  font-size: var(--text-xs);
  font-weight: 500;
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  background: var(--secondary);
  color: var(--muted-foreground);
  font-family: var(--font-mono);
  letter-spacing: -0.1px;
  transition: all var(--duration-fast) var(--ease-out);
}
.card:hover .tag { background: #e8e6e3; }

/* Category-colored tags */
.tag-web { background: #eff6ff; color: #3b82f6; }
.tag-game { background: #f0fdf4; color: #16a34a; }
.tag-tool { background: #fff7ed; color: #ea580c; }
.tag-doc  { background: #faf5ff; color: #9333ea; }

/* Card hover */
.card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: #d6d3d1;
}
.card:active { transform: translateY(-2px) scale(0.99); }

/* ════════════════════════════════════════
   EMPTY STATE
   ════════════════════════════════════════ */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: var(--space-16) var(--space-6);
  color: var(--muted-foreground);
}

.empty-icon { font-size: 48px; margin-bottom: var(--space-4); }
.empty-state p { font-size: var(--text-base); }

/* ════════════════════════════════════════
   BACK TO TOP FAB
   ════════════════════════════════════════ */
.fab {
  position: fixed; bottom: var(--space-8); right: var(--space-8);
  width: 44px; height: 44px;
  border-radius: var(--radius-full);
  background: var(--card);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  cursor: pointer;
  z-index: 200;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: all var(--duration-normal) var(--ease-out);
}
.fab.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.fab:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: #ccc;
}
.fab:active { transform: scale(0.93); }

/* ════════════════════════════════════════
   TOAST
   ════════════════════════════════════════ */
.toast {
  position: fixed; bottom: var(--space-8); left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--primary); color: var(--primary-foreground);
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-full);
  font-size: var(--text-sm); font-weight: 500;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s var(--ease-spring);
  box-shadow: var(--shadow-xl);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════════════════════════════════════════
   FOOTER
   ════════════════════════════════════════ */
.footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 0 var(--space-6) var(--space-10);
  font-size: var(--text-xs);
  color: #c0bfbc;
  letter-spacing: 0.4px;
}

/* ════════════════════════════════════════
   ANIMATIONS
   ════════════════════════════════════════ */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.anim-fade-down  { animation: fadeInDown 0.7s var(--ease-out) both; }
.anim-fade-up    { animation: fadeInUp 0.7s var(--ease-out) both; }
.anim-scale-in   { animation: scaleIn 0.5s var(--ease-spring) both; }

.anim-delay-100 { animation-delay: 0.1s; }
.anim-delay-150 { animation-delay: 0.15s; }
.anim-delay-200 { animation-delay: 0.2s; }
.anim-delay-300 { animation-delay: 0.3s; }

/* Card FLIP animation support */
.card.removing {
  animation: scaleOut 0.25s var(--ease-out) both;
  pointer-events: none;
}
@keyframes scaleOut {
  to { opacity: 0; transform: scale(0.9); }
}

/* ════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════ */
@media (max-width: 768px) {
  .header { padding: var(--space-12) var(--space-4) var(--space-6); }
  .header h1 { font-size: var(--text-xl); }
  .grid { grid-template-columns: 1fr; padding: 0 var(--space-4) var(--space-16); }
  .stat-card { flex: 0 1 100px; }
  .stat-value { font-size: var(--text-lg); }
  .card-cover { aspect-ratio: 16 / 10; }
  .card-cover-icon { font-size: 42px; }
  .fab { bottom: var(--space-4); right: var(--space-4); }
  .toast { bottom: var(--space-4); }
}

@media (max-width: 480px) {
  .stats-bar { gap: 4px; }
  .stat-card { flex: 0 1 70px; padding: var(--space-3) var(--space-2); }
  .stat-value { font-size: var(--text-base); }
  .stat-label { font-size: 10px; }
  .search-shortcut { display: none; }
  .filter-tab { padding: var(--space-2) var(--space-3); font-size: 12px; }
}
</style>
</head>
<body>

<!-- Scroll Progress -->
<div class="scroll-progress" id="scrollProgress"></div>

<!-- ═══════════ HEADER ═══════════ -->
<header class="header">
  <div class="avatar-group anim-scale-in">
    <div class="avatar-ring"></div>
    <div class="avatar" id="avatar" title="👋">W</div>
    <div class="level-badge">Lv6</div>
  </div>
  <h1 class="anim-fade-down">wkty18</h1>
  <p class="subtitle anim-fade-down anim-delay-100">全栈开发者 · 开源爱好者 · 终身学习者</p>

  <!-- Stats Bar -->
  <div class="stats-bar anim-fade-up anim-delay-200">
    <div class="stat-card">
      <div class="stat-value" data-target="15" data-suffix="">0</div>
      <div class="stat-label">项目</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" data-target="4" data-suffix="">0</div>
      <div class="stat-label">分类</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" data-target="12" data-suffix="">0</div>
      <div class="stat-label">技术栈</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" data-target="2026" data-suffix="">2024</div>
      <div class="stat-label">活跃年份</div>
    </div>
  </div>
</header>

<!-- ═══════════ TOOLBAR ═══════════ -->
<div class="toolbar" id="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="搜索项目名称、描述、标签..." autocomplete="off">
        <button class="search-clear" id="searchClear" aria-label="清除搜索">✕</button>
        <span class="search-shortcut">⌘K</span>

      <button class="filter-tab active" data-filter="all">全部<span class="filter-count">15</span></button>
      <button class="filter-tab" data-filter="web">🎨 Web<span class="filter-count">8</span></button>
      <button class="filter-tab" data-filter="game">🎮 游戏<span class="filter-count">3</span></button>
      <button class="filter-tab" data-filter="tool">🧰 工具<span class="filter-count">2</span></button>
      <button class="filter-tab" data-filter="doc">📄 文档<span class="filter-count">2</span></button>
    </div>
  </div>
</div>

<!-- ═══════════ PROJECT GRID ═══════════ -->
<main class="grid" id="grid"></main>

<!-- ═══════════ FOOTER ═══════════ -->
<footer class="footer">© 2026 wkty18 · Powered by Cloudflare Pages</footer>

<button class="fab" id="fab" aria-label="返回顶部" title="返回顶部">↑</button>

<!-- ═══════════ TOAST ═══════════ -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const projects = [
  { title: "📝 个人博客", desc: "多页博客 — 技术文章、项目心得、开发日志，个人联系信息与社交链接", icon: "📝", href: "blog.html", tags: ["Blog","个人页"], cat: "web" },
  { title: "HTML 可视化编辑器", desc: "Electron 桌面应用，所见即所得编辑网页，拖拽组件搭建页面", icon: "🎨", href: "html-visual-editor/src/index.html", tags: ["Electron","可视化"], cat: "web" },
  { title: "Paigechuizi", desc: "React + Vite 前端项目，现代 Web 应用脚手架，组件化开发", icon: "⚛️", href: "paigechuizi/dist/index.html", tags: ["React","Vite"], cat: "web" },
  { title: "待办事项", desc: "简洁实用的 Todo App，支持添加、完成、删除任务管理", icon: "✅", href: "todo-app/todo-app.html", tags: ["HTML","JS"], cat: "web" },
  { title: "Tier List 制作器", desc: "拖拽式等级列表制作工具，快速创建可视化排名图表", icon: "🏆", href: "tier-list-maker/tier-list-maker.html", tags: ["HTML","拖拽"], cat: "web" },
  { title: "微信模拟器", desc: "高保真微信界面模拟，还原真实聊天交互体验", icon: "💬", href: "wechat-simulator/wechat-simulator.html", tags: ["HTML","CSS"], cat: "web" },
  { title: "B站首页复刻", desc: "哔哩哔哩首页仿写，复刻经典布局与交互动效", icon: "📺", href: "bilibili-home/bilibili-home.html", tags: ["HTML","CSS"], cat: "web" },
  { title: "化学知识复习", desc: "化学知识结构化复习页面，知识点分类清晰展示", icon: "⚗️", href: "chemistry-review/chemistry-review.html", tags: ["HTML"], cat: "web" },
  { title: "Claude Code 介绍", desc: "AI 编程工具 Claude Code 的功能介绍与特性展示页", icon: "🤖", href: "claude-code-intro/claude-code-intro.html", tags: ["HTML","AI"], cat: "web" },
  { title: "高考政治复习", desc: "高考政治知识整理与系统复习资料", icon: "📖", href: "gaokao-politics-review/高考政治复习.html", tags: ["HTML"], cat: "web" },
  { title: "贪吃蛇游戏", desc: "经典贪吃蛇游戏，纯原生 Canvas 实现，操作流畅", icon: "🐍", href: "snake-game/snake.html", tags: ["Game","Canvas"], cat: "game" },
  { title: "云音乐悬浮窗", desc: "地平线 Forza Horizon 游戏内网易云音乐悬浮窗", icon: "🎵", href: "Cloud-Music-overlay-for-Forza-Horizon/", tags: ["Overlay","Music"], cat: "game" },
  { title: "LOL 英雄图鉴", desc: "Runeterra Codex — 英雄联盟全英雄信息宝典", icon: "⚔️", href: "lol-codex/index.html", tags: ["LOL","图鉴"], cat: "game" },
  { title: "Docx 文档生成器", desc: "基于 docx 库的 Word 文档自动化生成脚本", icon: "📝", href: "docx-generator/", tags: ["Node.js","docx"], cat: "tool" },
  { title: "B站点赞脚本", desc: "哔哩哔哩自动点赞辅助脚本", icon: "👍", href: "bilibili-like/bilibili_like.js", tags: ["JS","脚本"], cat: "tool" },
  { title: "排序工具规格说明", desc: "从夯到拉排序软件需求规格说明书", icon: "📋", href: "spec-sorting-tool/SPEC-从夯到拉排序软件.md", tags: ["Spec"], cat: "doc" },
  { title: "Minecraft 模组教程", desc: "Minecraft 1.20.1 Fabric 模组开发完整流程文档", icon: "⛏️", href: "minecraft-fabric-guide/", tags: ["Minecraft","Fabric"], cat: "doc" }
];

// ═══════════════════════════════════════
// DOM REFS
// ═══════════════════════════════════════
const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const filterTabs = document.getElementById('filterTabs');
const fab = document.getElementById('fab');
const toast = document.getElementById('toast');
const scrollProgress = document.getElementById('scrollProgress');
const toolbar = document.getElementById('toolbar');
const avatar = document.getElementById('avatar');
const statValues = document.querySelectorAll('.stat-value');

let currentFilter = 'all';
let toastTimer = null;
let avatarClickCount = 0;

// ═══════════════════════════════════════
// COUNT-UP ANIMATION
// ═══════════════════════════════════════
function animateStats() {
  statValues.forEach(el => {
    const target = parseInt(el.dataset.target);
    const suffix = el.dataset.suffix || '';
    const duration = 1500;
    const start = performance.now();
    const startVal = 0;

    function update(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      // ease-out curve
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.round(startVal + (target - startVal) * eased);
      el.textContent = current + suffix;
      if (progress < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  });
}

// ═══════════════════════════════════════
// TAG COLOR HELPER
// ═══════════════════════════════════════
function getTagClass(tag, cat) {
  const tagMap = {
    'Electron': 'tag-web', 'React': 'tag-web', 'Vite': 'tag-web',
    'HTML': 'tag-web', 'CSS': 'tag-web', 'JS': 'tag-tool',
    'AI': 'tag-doc', 'Canvas': 'tag-game', 'Game': 'tag-game',
    'LOL': 'tag-game', 'Overlay': 'tag-game', 'Music': 'tag-game',
    'Node.js': 'tag-tool', 'docx': 'tag-tool', '脚本': 'tag-tool',
    'Minecraft': 'tag-doc', 'Fabric': 'tag-doc', 'Spec': 'tag-doc',
    '拖拽': 'tag-web', '可视化': 'tag-web', '图鉴': 'tag-game'
  };
  return tagMap[tag] || '';
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
let renderId = 0;

function render() {
  const rid = ++renderId;
  const query = searchInput.value.toLowerCase().trim();
  const filter = currentFilter;

  const filtered = projects.filter(p => {
    if (filter !== 'all' && p.cat !== filter) return false;
    if (!query) return true;
    return p.title.toLowerCase().includes(query) ||
           p.desc.toLowerCase().includes(query) ||
           p.tags.some(t => t.toLowerCase().includes(query));
  });

  // Update filter counts
  updateFilterCounts(filter, query);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>没有找到匹配的项目</p></div>`;
    return;
  }

  grid.innerHTML = '';

  filtered.forEach((p, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = p.href;
    card.target = '_blank';
    card.rel = 'noopener';
    card.style.animationDelay = `${i * 0.05}s`;
    card.style.animation = `fadeInUp 0.5s var(--ease-out) ${i * 0.05}s both`;

    const coloredTags = p.tags.map(t => {
      const cls = getTagClass(t, p.cat);
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');

    card.innerHTML = `
      <div class="card-cover">
        <div class="card-cover-icon">${p.icon}</div>
        <div class="card-play-overlay">
          <div class="card-play-btn">▶</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-tags">${coloredTags}</div>
      </div>
    `;

    // 3D tilt
    card.addEventListener('mouseenter', () => {
      card.style.transition = 'transform 0.15s ease-out, box-shadow 0.35s cubic-bezier(0.16,1,0.3,1), border-color 0.35s cubic-bezier(0.16,1,0.3,1)';
    });
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      card.style.transform = `translateY(-6px) scale(1.02) perspective(800px) rotateY(${x * 8}deg) rotateX(${-y * 8}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
      card.style.transition = 'transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s cubic-bezier(0.16,1,0.3,1), border-color 0.35s cubic-bezier(0.16,1,0.3,1)';
    });

    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════
// FILTER COUNTS
// ═══════════════════════════════════════
function updateFilterCounts(activeFilter, query) {
  const tabs = filterTabs.querySelectorAll('.filter-tab');
  tabs.forEach(tab => {
    const f = tab.dataset.filter;
    const countSpan = tab.querySelector('.filter-count');
    if (!countSpan) return;
    let count;
    if (f === 'all') {
      count = projects.filter(p => matchSearch(p, query)).length;
    } else {
      count = projects.filter(p => p.cat === f && matchSearch(p, query)).length;
    }
    countSpan.textContent = count;
    // Update "全部" count badge when filtering
    if (f === 'all' && query) {
      countSpan.textContent = count;
    }
  });
}

function matchSearch(p, query) {
  if (!query) return true;
  return p.title.toLowerCase().includes(query) ||
         p.desc.toLowerCase().includes(query) ||
         p.tags.some(t => t.toLowerCase().includes(query));
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
searchInput.addEventListener('input', () => {
  const hasVal = searchInput.value.trim().length > 0;
  searchClear.classList.toggle('visible', hasVal);
  render();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  searchInput.focus();
  render();
});

// ═══════════════════════════════════════
// FILTER TABS
// ═══════════════════════════════════════
filterTabs.addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  filterTabs.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  searchInput.value = '';
  searchClear.classList.remove('visible');
  render();
});

// ═══════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  // ⌘K / Ctrl+K → focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  // Escape → clear search
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    searchInput.blur();
    render();
  }
});

// ═══════════════════════════════════════
// SCROLL PROGRESS + STICKY TOOLBAR
// ═══════════════════════════════════════
window.addEventListener('scroll', () => {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  scrollProgress.style.width = progress + '%';

  // Toolbar shadow
  toolbar.classList.toggle('scrolled', scrollTop > 10);

  // FAB visibility
  fab.classList.toggle('visible', scrollTop > 400);
}, { passive: true });

// ═══════════════════════════════════════
// BACK TO TOP
// ═══════════════════════════════════════
fab.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ═══════════════════════════════════════
// AVATAR CLICK EASTER EGG
// ═══════════════════════════════════════
avatar.addEventListener('click', () => {
  avatarClickCount++;
  const msgs = [
    '👋 你好呀！',
    '😊 又点了一次~',
    '🎉 恭喜发现彩蛋！',
    '🌟 你是第 ' + avatarClickCount + ' 个访客！',
    '💎 坚持就是胜利！',
    '🔥 别点了，去写代码吧！',
    '🐛 这里有个 bug —— 不，是 feature！'
  ];
  const msg = msgs[(avatarClickCount - 1) % msgs.length];
  showToast(msg);
});

function showToast(msg) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
render();
// Start count-up after a short delay
setTimeout(animateStats, 600);
</script>
