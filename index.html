<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — wkty18</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --border: #e5e5e5;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --accent: #2d2d2d;
  --tag-bg: #f3f3f3;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  padding: 80px 40px 40px;
  text-align: center;
  animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1);
}

.avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 600;
  margin-bottom: 24px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: default;
}
.avatar:hover {
  transform: scale(1.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.header h1 {
  font-size: 32px; font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}
.header p {
  margin-top: 8px;
  color: var(--text-secondary);
  font-size: 15px;
  letter-spacing: 0.2px;
}

/* ── Filter ── */
.filter-bar {
  display: flex; justify-content: center; gap: 8px;
  padding: 0 40px 40px;
  flex-wrap: wrap;
  animation: fadeDown 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both;
}

.filter-btn {
  padding: 8px 18px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px; font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  user-select: none;
  white-space: nowrap;
}
.filter-btn:hover {
  border-color: #bbb;
  color: var(--text);
  transform: translateY(-1px);
}
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px 80px;
}

.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
  animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(600px circle at var(--mx,50%) var(--my,50%), rgba(0,0,0,0.03), transparent 40%);
  opacity: 0;
  transition: opacity 0.4s ease;
}
.card:hover::before { opacity: 1; }
.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: #d0d0d0;
}

.card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 18px;
  background: var(--tag-bg);
  transition: transform 0.3s ease;
}
.card:hover .card-icon { transform: scale(1.1); }

.card-title {
  font-size: 16px; font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}
.card-desc {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 16px;
}

.tags {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.tag {
  font-size: 11px; font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--tag-bg);
  color: var(--text-secondary);
  letter-spacing: 0.2px;
  transition: all 0.25s ease;
}
.card:hover .tag { background: #eaeaea; }

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 0 40px 40px;
  color: #bbb;
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* ── Animations ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Card enter stagger ── */
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.20s; }
.card:nth-child(5) { animation-delay: 0.25s; }
.card:nth-child(6) { animation-delay: 0.30s; }
.card:nth-child(7) { animation-delay: 0.35s; }
.card:nth-child(8) { animation-delay: 0.40s; }
.card:nth-child(9) { animation-delay: 0.45s; }
.card:nth-child(10) { animation-delay: 0.50s; }
.card:nth-child(11) { animation-delay: 0.55s; }
.card:nth-child(12) { animation-delay: 0.60s; }
.card:nth-child(13) { animation-delay: 0.65s; }
.card:nth-child(14) { animation-delay: 0.70s; }
.card:nth-child(15) { animation-delay: 0.75s; }

.card.hidden {
  display: none;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .header { padding: 48px 24px 32px; }
  .header h1 { font-size: 26px; }
  .grid { grid-template-columns: 1fr; padding: 0 24px 60px; }
  .filter-bar { padding: 0 24px 32px; }
}
</style>
</head>
<body>

    tags: ["Minecraft", "Fabric"],

const grid = document.getElementById('grid');
const buttons = document.querySelectorAll('.filter-btn');

function render(filter = 'all') {
  grid.innerHTML = '';
  projects.forEach((p, i) => {
    if (filter !== 'all' && p.cat !== filter) return;
    const card = document.createElement('a');
    card.className = 'card';
    card.href = p.href;
    card.target = '_blank';
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="card-icon">${p.icon}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    `;
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      card.style.setProperty('--mx', `${e.clientX - rect.left}px`);
      card.style.setProperty('--my', `${e.clientY - rect.top}px`);
    });
    grid.appendChild(card);
  });
}

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

render();
</script>
