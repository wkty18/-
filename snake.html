<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇 · 小清新</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f2;
    --card: #ffffff;
    --card-border: #e8e4dc;
    --text: #4a4538;
    --text-dim: #b0a99b;
    --text-soft: #8c8472;
    --mint: #7ecba1;
    --mint-deep: #5aad7a;
    --mint-light: #c5ecd4;
    --pink: #f0a8b8;
    --pink-deep: #e88395;
    --pink-light: #fce4e9;
    --peach: #f5c6a0;
    --peach-light: #fef0e5;
    --lavender: #c8b8e8;
    --lavender-light: #efe8f8;
    --shadow-soft: 0 2px 16px rgba(120,100,80,0.06);
    --shadow-card: 0 4px 24px rgba(120,100,80,0.07);
    --radius: 22px;
    --radius-sm: 14px;
    --radius-xs: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 600px 400px at 20% 20%, rgba(126,203,161,0.10), transparent),
      radial-gradient(ellipse 500px 350px at 80% 75%, rgba(240,168,184,0.09), transparent),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(200,184,232,0.06), transparent);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Quicksand', 'Noto Serif SC', sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    cursor: default;
  }

  /* Floating decorative leaves */
  .deco {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
    animation: floatLeaf 14s ease-in-out infinite;
  }
  .deco-1 { top: 8%; left: 6%; font-size: 2.4rem; animation-delay: 0s; animation-duration: 13s; }
  .deco-2 { top: 15%; right: 8%; font-size: 1.8rem; animation-delay: -3s; animation-duration: 15s; }
  .deco-3 { bottom: 12%; left: 10%; font-size: 2rem; animation-delay: -6s; animation-duration: 16s; }
  .deco-4 { bottom: 20%; right: 12%; font-size: 2.6rem; animation-delay: -9s; animation-duration: 14s; }
  .deco-5 { top: 45%; left: 3%; font-size: 1.4rem; animation-delay: -4s; animation-duration: 17s; }
  .deco-6 { top: 55%; right: 5%; font-size: 1.6rem; animation-delay: -7s; animation-duration: 12s; }

  @keyframes floatLeaf {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    25% { transform: translateY(-18px) rotate(5deg) scale(1.08); }
    50% { transform: translateY(-6px) rotate(-3deg) scale(0.94); }
    75% { transform: translateY(-22px) rotate(4deg) scale(1.05); }
  }

  /* Main container */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .logo {
    font-family: 'Quicksand', 'Noto Serif SC', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: 0.03em;
    color: var(--mint-deep);
  }
  .logo::before { content: '🍃 '; }
  .logo::after { content: ' · 小清新'; font-weight: 400; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.06em; }

  .score-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow-soft);
  }
  .score-item { text-align: center; }
  .score-label {
    font-family: 'Quicksand', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .score-value {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.45rem;
    color: var(--text);
    min-width: 40px;
    transition: all 0.15s ease;
  }
  .score-value.pulse {
    color: var(--pink-deep);
    transform: scale(1.2);
  }
  .score-divider {
    width: 1px; height: 28px;
    background: var(--card-border);
    border-radius: 1px;
  }
  .best-value {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--peach);
  }

  /* Cheat toggle button */
  .cheat-toggle {
    position: relative;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 50%;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-soft);
    color: var(--text-dim);
  }
  .cheat-toggle:hover {
    border-color: var(--pink);
    color: var(--pink-deep);
    box-shadow: 0 2px 12px rgba(240,168,184,0.2);
  }
  .cheat-toggle.active {
    background: var(--pink-light);
    border-color: var(--pink);
    color: var(--pink-deep);
  }

  /* Cheat panel */
  .cheat-panel {
    position: absolute;
    top: 0;
    right: calc(100% + 12px);
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 210px;
    opacity: 0;
    visibility: hidden;
    transform: translateX(8px);
    transition: all 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
    z-index: 100;
  }
  .cheat-panel.open {
    opacity: 1;
    visibility: visible;
    transform: translateX(0);
  }
  .cheat-panel-title {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    color: var(--text);
    margin-bottom: -4px;
  }
  .cheat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .cheat-label {
    font-size: 0.78rem;
    color: var(--text-soft);
    white-space: nowrap;
  }
  .cheat-badge {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .cheat-badge.on {
    background: var(--mint-light);
    color: var(--mint-deep);
  }
  .cheat-badge.off {
    background: #f0ede6;
    color: var(--text-dim);
  }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 44px; height: 26px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #e8e4dc;
    border-radius: 26px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .toggle-slider::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: all 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .toggle input:checked + .toggle-slider {
    background: var(--mint);
  }
  .toggle input:checked + .toggle-slider::after {
    transform: translateX(18px);
  }

  .cheat-speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cheat-speed-row input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 4px;
    background: #e8e4dc;
    outline: none;
  }
  .cheat-speed-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--mint);
    cursor: pointer;
    box-shadow: 0 1px 6px rgba(126,203,161,0.3);
    transition: all 0.2s ease;
  }
  .cheat-speed-row input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }
  .speed-val {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    color: var(--text-soft);
    min-width: 36px;
    text-align: right;
  }

  .cheat-btn {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    padding: 8px 16px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--mint);
    background: var(--mint-light);
    color: var(--mint-deep);
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }
  .cheat-btn:hover {
    background: var(--mint);
    color: #fff;
  }
  .cheat-btn:active { transform: scale(0.96); }

  /* Game wrapper */
  .game-wrapper {
    position: relative;
    border-radius: var(--radius);
    padding: 4px;
    background: linear-gradient(135deg, rgba(126,203,161,0.3), rgba(200,184,232,0.25), rgba(240,168,184,0.25));
    box-shadow:
      0 0 40px rgba(126,203,161,0.06),
      0 16px 48px rgba(120,100,80,0.08);
    transition: all 0.4s ease;
  }
  .game-wrapper.game-over-state {
    background: linear-gradient(135deg, rgba(240,168,184,0.4), rgba(245,198,160,0.35));
    box-shadow:
      0 0 40px rgba(240,168,184,0.1),
      0 16px 48px rgba(120,100,80,0.08);
  }
  .game-wrapper.god-active {
    background: linear-gradient(135deg, rgba(200,184,232,0.45), rgba(126,203,161,0.3), rgba(200,184,232,0.25));
    box-shadow:
      0 0 50px rgba(200,184,232,0.12),
      0 16px 48px rgba(120,100,80,0.08);
  }

  .game-inner {
    background: #fdfcf9;
    border-radius: calc(var(--radius) - 2px);
    overflow: hidden;
    position: relative;
  }

  canvas {
    display: block;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(253,252,249,0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: calc(var(--radius) - 2px);
    transition: opacity 0.4s ease, visibility 0.4s ease;
    z-index: 10;
  }
  .overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .overlay-emoji {
    font-size: 3.6rem;
    margin-bottom: 8px;
    animation: bobEmoji 2.5s ease-in-out infinite;
  }
  @keyframes bobEmoji {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .overlay-title {
    font-family: 'Quicksand', 'Noto Serif SC', sans-serif;
    font-weight: 700;
    font-size: 1.9rem;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-bottom: 2px;
  }
  .overlay-subtitle {
    font-family: 'Noto Serif SC', serif;
    font-weight: 400;
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 28px;
    letter-spacing: 0.06em;
  }
  .overlay-score {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 3.4rem;
    color: var(--mint-deep);
    margin-bottom: 6px;
  }
  .overlay-best {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }
  .overlay-best span {
    color: var(--peach);
    font-weight: 600;
  }

  /* Buttons */
  .btn {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    padding: 14px 38px;
    border-radius: var(--radius-xs);
    border: none;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
    outline: none;
  }
  .btn-play {
    background: linear-gradient(135deg, var(--mint), var(--mint-deep));
    color: #fff;
    box-shadow: 0 4px 18px rgba(126,203,161,0.3);
  }
  .btn-play:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(126,203,161,0.4);
  }
  .btn-play:active {
    transform: translateY(0);
    box-shadow: 0 2px 10px rgba(126,203,161,0.25);
  }
  .btn-retry {
    background: var(--card);
    color: var(--text);
    border: 1.5px solid var(--card-border);
    box-shadow: var(--shadow-soft);
  }
  .btn-retry:hover {
    border-color: var(--mint);
    color: var(--mint-deep);
    box-shadow: 0 4px 16px rgba(126,203,161,0.12);
  }

  /* Controls hint */
  .controls-hint {
    display: flex;
    gap: 20px;
    font-family: 'Quicksand', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .controls-hint kbd {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 3px 9px;
    font-family: 'Quicksand', sans-serif;
    font-size: 0.56rem;
    font-weight: 600;
    color: var(--text-soft);
    margin: 0 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }

  /* God mode indicator */
  .god-indicator {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--lavender-light);
    color: #9b87d0;
    opacity: 0;
    transform: translateY(-4px);
    transition: all 0.35s ease;
    pointer-events: none;
    z-index: 5;
    font-family: 'Quicksand', sans-serif;
  }
  .god-indicator.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
  }
  .dpad {
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
    gap: 5px;
  }
  .dpad-btn {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-xs);
    color: var(--text-soft);
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    box-shadow: var(--shadow-soft);
  }
  .dpad-btn:active {
    background: var(--mint-light);
    border-color: var(--mint);
    color: var(--mint-deep);
    transform: scale(0.9);
  }
  .dpad-empty { background: transparent; border: none; box-shadow: none; }

  @media (max-width: 640px) {
    .mobile-controls { display: flex; justify-content: center; }
    .controls-hint { display: none; }
    .app { gap: 14px; }
    .cheat-panel {
      right: auto;
      left: 50%;
      transform: translate(-50%, 8px);
      top: calc(100% + 10px);
    }
    .cheat-panel.open {
      transform: translate(-50%, 0);
    }
    .logo { font-size: 1.2rem; }
    .score-card { padding: 8px 14px; }
    .score-value { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- Floating decorations -->
<div class="deco deco-1">🌿</div>
<div class="deco deco-2">🌸</div>
<div class="deco deco-3">🍀</div>
<div class="deco deco-4">🌱</div>
<div class="deco deco-5">💮</div>
<div class="deco deco-6">✨</div>

<div class="app">
  <div class="header">
    <div class="logo">贪吃蛇</div>
    <div class="score-card">
      <div class="score-item">
        <div class="score-label">得分</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-divider"></div>
      <div class="score-item">
        <div class="score-label">最佳</div>
        <div class="best-value" id="best">0</div>
      </div>
    </div>
    <!-- Cheat toggle -->
    <div style="position:relative;">
      <button class="cheat-toggle" id="cheatToggle" title="作弊菜单">🪄</button>
      <div class="cheat-panel" id="cheatPanel">
        <div class="cheat-panel-title">✨ 作弊菜单</div>

        <div class="cheat-row">
          <span class="cheat-label">🛡️ 穿墙模式</span>
          <label class="toggle">
            <input type="checkbox" id="cheatWall">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="cheat-row">
          <span class="cheat-label">💫 无视自碰</span>
          <label class="toggle">
            <input type="checkbox" id="cheatSelf">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="cheat-row">
          <span class="cheat-label">⏱ 游戏速度</span>
        </div>
        <div class="cheat-speed-row">
          <span style="font-size:0.65rem;color:var(--text-dim);">慢</span>
          <input type="range" id="cheatSpeed" min="40" max="200" value="100" step="10">
          <span style="font-size:0.65rem;color:var(--text-dim);">快</span>
          <span class="speed-val" id="speedVal">100ms</span>
        </div>

        <button class="cheat-btn" id="cheatExtraFood">🍓 额外投放食物</button>
        <button class="cheat-btn" id="cheatScoreBoost" style="border-color:var(--pink);background:var(--pink-light);color:var(--pink-deep);">⭐ +50 分数</button>
      </div>
    </div>
  </div>

  <div class="game-wrapper" id="wrapper">
    <div class="game-inner">
      <canvas id="canvas"></canvas>
      <div class="god-indicator" id="godIndicator">🛡️ 穿墙模式</div>
      <div class="overlay" id="overlay">
        <div class="overlay-emoji">🍃</div>
        <div class="overlay-title">贪吃蛇</div>
        <div class="overlay-subtitle">小清新版</div>
        <button class="btn btn-play" id="btnPlay">开始游戏</button>
        <div class="controls-hint" style="margin-top:20px;">
          <span><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></span>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-controls" id="mobileControls">
    <div class="dpad">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnUp">▲</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnLeft">◀</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnRight">▶</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="btnDown">▼</button>
      <div class="dpad-empty"></div>
    </div>
  </div>
</div>

<script>
(function() {
  // ── Canvas ──────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const CELL = 20;
  const COLS = 25;
  const ROWS = 25;
  const W = COLS * CELL;
  const H = ROWS * CELL;

  canvas.width = W;
  canvas.height = H;
  function resizeCanvas() {
    canvas.style.width = Math.min(W, window.innerWidth - 32) + 'px';
    canvas.style.height = Math.min(H, window.innerHeight - 320) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── DOM refs ────────────────────────────────────
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const wrapper = document.getElementById('wrapper');
  const btnPlay = document.getElementById('btnPlay');
  const godIndicator = document.getElementById('godIndicator');
  const mobileControls = document.getElementById('mobileControls');
  const cheatToggle = document.getElementById('cheatToggle');
  const cheatPanel = document.getElementById('cheatPanel');
  const cheatWall = document.getElementById('cheatWall');
  const cheatSelf = document.getElementById('cheatSelf');
  const cheatSpeed = document.getElementById('cheatSpeed');
  const speedVal = document.getElementById('speedVal');
  const cheatExtraFood = document.getElementById('cheatExtraFood');
  const cheatScoreBoost = document.getElementById('cheatScoreBoost');

  // ── State ───────────────────────────────────────
  let MOVE_INTERVAL = 100;
  const SMOOTH = 0.30;

  let snake = [];
  let direction = { x: 1, y: 0 };
  let nextDirection = { x: 1, y: 0 };
  let food = { x: 0, y: 0 };
  let extraFoods = []; // cheat: extra food items
  let score = 0;
  let best = parseInt(localStorage.getItem('snake-fresh-best') || '0');
  let gameState = 'idle'; // idle | playing | over
  let moveTimer = 0;
  let lastTime = 0;
  let particles = [];
  let visualSnake = [];

  // Cheat flags
  let cheatGodMode = false;
  let cheatNoSelf = false;

  bestEl.textContent = best;
  speedVal.textContent = MOVE_INTERVAL + 'ms';

  // ── Initialize ──────────────────────────────────
  function init() {
    const startX = Math.floor(COLS / 2);
    const startY = Math.floor(ROWS / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY },
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    particles = [];
    extraFoods = [];
    visualSnake = snake.map(s => ({ x: s.x * CELL + CELL/2, y: s.y * CELL + CELL/2 }));
    scoreEl.textContent = '0';
    scoreEl.classList.remove('pulse');
    wrapper.classList.remove('game-over-state');
    wrapper.classList.toggle('god-active', cheatGodMode);
    godIndicator.classList.toggle('visible', cheatGodMode);
    placeFood();
    moveTimer = 0;
  }

  function occupiedSet() {
    const set = new Set(snake.map(s => `${s.x},${s.y}`));
    extraFoods.forEach(f => set.add(`${f.x},${f.y}`));
    set.add(`${food.x},${food.y}`);
    return set;
  }

  function randomFreeCell() {
    const occ = occupiedSet();
    const candidates = [];
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        if (!occ.has(`${x},${y}`)) candidates.push({ x, y });
      }
    }
    return candidates.length > 0 ? candidates[Math.floor(Math.random() * candidates.length)] : null;
  }

  function placeFood() {
    const pos = randomFreeCell();
    if (pos) food = pos;
  }

  // ── Particles ───────────────────────────────────
  function spawnParticles(gx, gy, color, count, sizeMul) {
    sizeMul = sizeMul || 1;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.2 + Math.random() * 3.5;
      particles.push({
        x: gx * CELL + CELL / 2,
        y: gy * CELL + CELL / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.018 + Math.random() * 0.04,
        size: (1.5 + Math.random() * 3) * sizeMul,
        color,
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles(ctx) {
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ── Drawing ─────────────────────────────────────
  function drawGrid(ctx) {
    ctx.fillStyle = '#ece8df';
    for (let x = 0; x <= COLS; x++) {
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.arc(x * CELL, y * CELL, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawSnakeSegment(ctx, x, y, r, i, total) {
    const t = total > 1 ? i / (total - 1) : 0;
    // Mint green → sage gradient
    const r1=126,g1=203,b1=161; // mint
    const r2=90,g2=167,b2=120;  // deeper sage
    const cr = Math.round(r1 + (r2 - r1) * t);
    const cg = Math.round(g1 + (g2 - g1) * t);
    const cb = Math.round(b1 + (b2 - b1) * t);
    const alpha = 1 - t * 0.35;

    ctx.save();

    // Soft shadow
    ctx.shadowColor = `rgba(${cr},${cg},${cb},0.25)`;
    ctx.shadowBlur = i === 0 ? 8 : 4;
    ctx.shadowOffsetY = 1;

    // Body gradient
    const grad = ctx.createRadialGradient(x - r*0.25, y - r*0.3, r*0.08, x, y, r);
    grad.addColorStop(0, `rgba(${Math.min(255,cr+50)},${Math.min(255,cg+40)},${Math.min(255,cb+40)},${alpha})`);
    grad.addColorStop(0.6, `rgba(${cr},${cg},${cb},${alpha})`);
    grad.addColorStop(1, `rgba(${Math.max(0,cr-25)},${Math.max(0,cg-25)},${Math.max(0,cb-25)},${alpha})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = `rgba(255,255,255,${0.22 - t*0.14})`;
    ctx.beginPath();
    ctx.arc(x - r*0.22, y - r*0.28, r*0.3, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    // Eyes on head
    if (i === 0) {
      const eyeR = r * 0.28;
      const eyeDist = r * 0.42;
      const eyeForward = r * 0.28;
      let eyes = [];
      if (direction.x === 1)      { eyes = [[x+eyeForward,y-eyeDist],[x+eyeForward,y+eyeDist]]; }
      else if (direction.x === -1){ eyes = [[x-eyeForward,y-eyeDist],[x-eyeForward,y+eyeDist]]; }
      else if (direction.y === -1){ eyes = [[x-eyeDist,y-eyeForward],[x+eyeDist,y-eyeForward]]; }
      else                         { eyes = [[x-eyeDist,y+eyeForward],[x+eyeDist,y+eyeForward]]; }
      for (const [ex, ey] of eyes) {
        ctx.fillStyle = '#fdfcf9';
        ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#4a4538';
        ctx.beginPath(); ctx.arc(ex, ey, eyeR*0.45, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawFoodItem(ctx, gx, gy, t, isExtra) {
    const cx = gx * CELL + CELL / 2;
    const cy = gy * CELL + CELL / 2;
    const pulse = 0.88 + Math.sin(t * 5 + (isExtra ? 2 : 0)) * 0.12;
    const r = CELL * 0.36 * pulse;

    ctx.save();

    if (isExtra) {
      // Lavender extra food
      ctx.shadowColor = 'rgba(200,184,232,0.5)';
      ctx.shadowBlur = 12 + Math.sin(t * 5) * 4;
      const grad = ctx.createRadialGradient(cx-r*0.2, cy-r*0.3, r*0.05, cx, cy, r);
      grad.addColorStop(0, '#e8dff5');
      grad.addColorStop(0.4, '#c8b8e8');
      grad.addColorStop(0.8, '#a890d4');
      grad.addColorStop(1, '#7b5ea7');
      ctx.fillStyle = grad;
    } else {
      // Pink main food (strawberry-like)
      ctx.shadowColor = 'rgba(240,168,184,0.55)';
      ctx.shadowBlur = 14 + Math.sin(t * 5.5) * 5;
      const grad = ctx.createRadialGradient(cx-r*0.2, cy-r*0.3, r*0.05, cx, cy, r);
      grad.addColorStop(0, '#fce4e9');
      grad.addColorStop(0.35, '#f0a8b8');
      grad.addColorStop(0.7, '#e88395');
      grad.addColorStop(1, '#c9647a');
      ctx.fillStyle = grad;
    }

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(cx - r*0.2, cy - r*0.3, r*0.26, 0, Math.PI*2);
    ctx.fill();

    // Tiny leaf on top
    ctx.fillStyle = isExtra ? '#c8b8e8' : '#f0a8b8';
    ctx.beginPath();
    ctx.ellipse(cx, cy - r*1.05, r*0.45, r*0.18, 0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = isExtra ? '#a890d4' : '#e88395';
    ctx.beginPath();
    ctx.ellipse(cx + r*0.15, cy - r*1.1, r*0.28, r*0.1, -0.2, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  // ── Game loop ───────────────────────────────────
  function update(dt) {
    if (gameState !== 'playing') return;

    // Lerp visuals
    for (let i = 0; i < snake.length; i++) {
      const tx = snake[i].x * CELL + CELL / 2;
      const ty = snake[i].y * CELL + CELL / 2;
      if (!visualSnake[i]) visualSnake[i] = { x: tx, y: ty };
      visualSnake[i].x += (tx - visualSnake[i].x) * SMOOTH * (dt / 16);
      visualSnake[i].y += (ty - visualSnake[i].y) * SMOOTH * (dt / 16);
    }
    visualSnake.length = snake.length;

    moveTimer += dt;
    if (moveTimer >= MOVE_INTERVAL) {
      moveTimer -= MOVE_INTERVAL;
      direction = { ...nextDirection };

      const head = snake[0];
      let newHead = { x: head.x + direction.x, y: head.y + direction.y };

      // God mode: wrap around
      if (cheatGodMode) {
        if (newHead.x < 0) newHead.x = COLS - 1;
        if (newHead.x >= COLS) newHead.x = 0;
        if (newHead.y < 0) newHead.y = ROWS - 1;
        if (newHead.y >= ROWS) newHead.y = 0;
      } else {
        // Wall death
        if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
          return gameOver();
        }
      }

      // Self collision
      if (!cheatNoSelf) {
        for (const s of snake) {
          if (s.x === newHead.x && s.y === newHead.y) {
            return gameOver();
          }
        }
      }

      snake.unshift(newHead);

      // Eat: main food
      let ate = false;
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        ate = true;
        spawnParticles(food.x, food.y, '#f0a8b8', 12);
        spawnParticles(food.x, food.y, '#f5c6a0', 5);
        spawnParticles(food.x, food.y, '#ffffff', 4);
        placeFood();
      }

      // Eat: extra foods
      for (let i = extraFoods.length - 1; i >= 0; i--) {
        if (newHead.x === extraFoods[i].x && newHead.y === extraFoods[i].y) {
          score += 15;
          ate = true;
          spawnParticles(extraFoods[i].x, extraFoods[i].y, '#c8b8e8', 10);
          spawnParticles(extraFoods[i].x, extraFoods[i].y, '#ffffff', 3);
          extraFoods.splice(i, 1);
        }
      }

      if (ate) {
        scoreEl.textContent = score;
        scoreEl.classList.add('pulse');
        setTimeout(() => scoreEl.classList.remove('pulse'), 150);
        // Food keeps snake growing (don't pop)
      } else {
        snake.pop();
      }
    }

    updateParticles(dt);
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#fdfcf9';
    ctx.fillRect(0, 0, W, H);

    drawGrid(ctx);

    // Draw extra foods
    for (const ef of extraFoods) {
      drawFoodItem(ctx, ef.x, ef.y, t / 1000, true);
    }

    // Draw main food
    drawFoodItem(ctx, food.x, food.y, t / 1000, false);

    // Draw snake
    const r = CELL * 0.40;
    for (let i = visualSnake.length - 1; i >= 0; i--) {
      drawSnakeSegment(ctx, visualSnake[i].x, visualSnake[i].y, r, i, visualSnake.length);
    }

    drawParticles(ctx);
  }

  function loop(ts) {
    const dt = lastTime ? Math.min(ts - lastTime, 50) : 16;
    lastTime = ts;
    update(dt);
    draw(ts);
    requestAnimationFrame(loop);
  }

  function gameOver() {
    gameState = 'over';
    wrapper.classList.add('game-over-state');
    wrapper.classList.remove('god-active');
    godIndicator.classList.remove('visible');

    if (score > best) {
      best = score;
      localStorage.setItem('snake-fresh-best', best);
      bestEl.textContent = best;
    }

    const head = snake[0];
    spawnParticles(head.x, head.y, '#f0a8b8', 25);
    spawnParticles(head.x, head.y, '#f5c6a0', 10);
    spawnParticles(head.x, head.y, '#ffffff', 8);

    overlay.innerHTML = `
      <div class="overlay-emoji">${score >= 100 ? '🎉' : '💫'}</div>
      <div class="overlay-title" style="color:var(--pink-deep);">游戏结束</div>
      <div class="overlay-score">${score}</div>
      <div class="overlay-best">历史最佳 <span>${best}</span></div>
      <button class="btn btn-retry" id="btnRetry">再来一局</button>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('btnRetry').addEventListener('click', startGame);
  }

  function startGame() {
    init();
    gameState = 'playing';
    moveTimer = 0;
    lastTime = performance.now();
    overlay.classList.add('hidden');
  }

  // ── Input ───────────────────────────────────────
  function changeDir(dx, dy) {
    if (gameState !== 'playing') return;
    if (dx === -direction.x && dy === -direction.y) return;
    if (dx === 0 && dy === 0) return;
    nextDirection = { x: dx, y: dy };
  }

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return; // allow range slider
    const key = e.key.toLowerCase();

    if (gameState === 'idle' && ['arrowup','w','arrowdown','s','arrowleft','a','arrowright','d'].includes(key)) {
      e.preventDefault();
      startGame();
    }

    switch (key) {
      case 'arrowup': case 'w': e.preventDefault(); changeDir(0, -1); break;
      case 'arrowdown': case 's': e.preventDefault(); changeDir(0, 1); break;
      case 'arrowleft': case 'a': e.preventDefault(); changeDir(-1, 0); break;
      case 'arrowright': case 'd': e.preventDefault(); changeDir(1, 0); break;
      case ' ':
        e.preventDefault();
        if (gameState === 'idle' || gameState === 'over') startGame();
        break;
      case 'g':
        // Quick god mode toggle via G key
        if (e.ctrlKey || e.metaKey) break;
        e.preventDefault();
        cheatWall.checked = !cheatWall.checked;
        cheatGodMode = cheatWall.checked;
        wrapper.classList.toggle('god-active', cheatGodMode);
        godIndicator.classList.toggle('visible', cheatGodMode);
        cheatToggle.classList.toggle('active', cheatGodMode || cheatNoSelf);
        break;
    }
  });

  // Mobile
  document.getElementById('btnUp').addEventListener('pointerdown', (e) => { e.preventDefault(); if (gameState==='idle') startGame(); changeDir(0,-1); });
  document.getElementById('btnDown').addEventListener('pointerdown', (e) => { e.preventDefault(); if (gameState==='idle') startGame(); changeDir(0,1); });
  document.getElementById('btnLeft').addEventListener('pointerdown', (e) => { e.preventDefault(); if (gameState==='idle') startGame(); changeDir(-1,0); });
  document.getElementById('btnRight').addEventListener('pointerdown', (e) => { e.preventDefault(); if (gameState==='idle') startGame(); changeDir(1,0); });

  // Touch swipe
  let touchSX=0, touchSY=0;
  canvas.addEventListener('touchstart', e => { touchSX=e.touches[0].clientX; touchSY=e.touches[0].clientY; }, {passive:true});
  canvas.addEventListener('touchend', e => {
    const dx=e.changedTouches[0].clientX-touchSX, dy=e.changedTouches[0].clientY-touchSY;
    if (Math.abs(dx)<20 && Math.abs(dy)<20) return;
    if (gameState==='idle') startGame();
    if (Math.abs(dx)>Math.abs(dy)) changeDir(dx>0?1:-1, 0);
    else changeDir(0, dy>0?1:-1);
  });

  btnPlay.addEventListener('click', startGame);

  if (window.innerWidth <= 640 || 'ontouchstart' in window) {
    mobileControls.style.display = 'flex';
  }

  // ── Cheat Menu ──────────────────────────────────
  cheatToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    cheatPanel.classList.toggle('open');
  });

  document.addEventListener('click', (e) => {
    if (!cheatPanel.contains(e.target) && e.target !== cheatToggle) {
      cheatPanel.classList.remove('open');
    }
  });
  cheatPanel.addEventListener('click', (e) => e.stopPropagation());

  // God mode
  cheatWall.addEventListener('change', () => {
    cheatGodMode = cheatWall.checked;
    wrapper.classList.toggle('god-active', cheatGodMode);
    godIndicator.classList.toggle('visible', cheatGodMode);
    updateCheatToggleState();
  });

  // No self collision
  cheatSelf.addEventListener('change', () => {
    cheatNoSelf = cheatSelf.checked;
    updateCheatToggleState();
  });

  // Speed
  cheatSpeed.addEventListener('input', () => {
    MOVE_INTERVAL = parseInt(cheatSpeed.value);
    speedVal.textContent = MOVE_INTERVAL + 'ms';
  });

  // Extra food
  cheatExtraFood.addEventListener('click', () => {
    if (gameState !== 'playing') return;
    const pos = randomFreeCell();
    if (pos) {
      extraFoods.push(pos);
      spawnParticles(pos.x, pos.y, '#c8b8e8', 8, 0.6);
    }
  });

  // Score boost
  cheatScoreBoost.addEventListener('click', () => {
    if (gameState !== 'playing') return;
    score += 50;
    scoreEl.textContent = score;
    scoreEl.classList.add('pulse');
    setTimeout(() => scoreEl.classList.remove('pulse'), 150);
    // Visual sparkle on head
    const head = snake[0];
    spawnParticles(head.x, head.y, '#f5c6a0', 15);
    spawnParticles(head.x, head.y, '#ffffff', 6);
  });

  function updateCheatToggleState() {
    cheatToggle.classList.toggle('active', cheatGodMode || cheatNoSelf);
  }

  // ── Bootstrap ───────────────────────────────────
  init();
  lastTime = performance.now();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
