<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runeterra Codex — 英雄联盟信息宝典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #06090F;
  --bg-base: #0C1119;
  --bg-surface: #111827;
  --bg-card: #161D2A;
  --bg-card-hover: #1C2433;
  --bg-input: #0D1320;
  --hex: #00B4D8;
  --hex-bright: #48CAE4;
  --hex-glow: #90E0EF;
  --hex-dim: #0077B6;
  --gold: #FFD166;
  --gold-bright: #FFE5A3;
  --gold-dim: #B8960C;
  --red: #EF476F;
  --red-glow: #FF6B8A;
  --green: #06D6A0;
  --purple: #A855F7;
  --text-primary: #E8ECF1;
  --text-secondary: #94A3B8;
  --text-dim: #64748B;
  --border-subtle: rgba(148,163,184,0.08);
  --border-hex: rgba(0,180,216,0.25);
  --border-gold: rgba(255,209,102,0.3);
  --shadow-hex: 0 0 24px rgba(0,180,216,0.12);
  --shadow-gold: 0 0 24px rgba(255,209,102,0.12);
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 14px;
  --font-display: 'Cinzel', serif;
  --font-chinese: 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);font-size:15px;line-height:1.6}
body{min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(0,180,216,0.04) 0%,transparent 55%),radial-gradient(ellipse at 85% 70%,rgba(255,209,102,0.03) 0%,transparent 55%),radial-gradient(ellipse at 50% 40%,rgba(168,85,247,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 5l4 8 8 4-8 4-4 8-4-8-8-4 8-4z' fill='none' stroke='%2300B4D8' stroke-width='0.3' opacity='0.06'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg-deep)}::-webkit-scrollbar-thumb{background:var(--hex-dim);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--hex)}

.app{position:relative;z-index:1;max-width:1500px;margin:0 auto;padding:0 28px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 20px;border-bottom:1px solid var(--border-subtle);gap:20px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:14px}
.logo-hex{width:44px;height:44px;position:relative;display:flex;align-items:center;justify-content:center}
.logo-hex svg{width:44px;height:44px}
.logo-hex .hex-path{fill:none;stroke:var(--hex);stroke-width:1.5;filter:drop-shadow(0 0 8px rgba(0,180,216,0.5));animation:hexPulse 3s ease-in-out infinite}
@keyframes hexPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(0,180,216,0.5))}50%{filter:drop-shadow(0 0 20px rgba(0,180,216,0.8))}}
.logo-text h1{font-family:var(--font-display);font-size:1.4rem;font-weight:900;letter-spacing:0.06em;color:var(--hex-bright);text-transform:uppercase;line-height:1.2}
.logo-text span{font-family:var(--font-chinese);font-size:0.7rem;letter-spacing:0.15em;color:var(--text-dim)}

/* MODE SWITCHER */
.mode-switch{display:flex;gap:2px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:3px}
.mode-btn{font-family:var(--font-body);font-size:0.82rem;font-weight:500;color:var(--text-secondary);background:transparent;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;transition:all .25s;white-space:nowrap;letter-spacing:0.02em}
.mode-btn:hover{color:var(--text-primary);background:rgba(0,180,216,0.06)}
.mode-btn.active{color:var(--hex-bright);background:rgba(0,180,216,0.12);font-weight:700}

/* MODE HEADER BADGE */
.mode-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;letter-spacing:0.04em;margin-right:12px}
.mode-badge.ranked{background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.25);color:var(--gold)}
.mode-badge.aram{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.25);color:var(--purple)}

/* STATS BAR */
.stats-bar{display:flex;gap:16px;padding:20px 0;flex-wrap:wrap}
.stat-item{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);transition:all .3s}
.stat-item:hover{border-color:var(--border-hex);box-shadow:var(--shadow-hex)}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-dot.hex{background:var(--hex);box-shadow:0 0 8px var(--hex)}
.stat-dot.gold{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.stat-dot.purple{background:var(--purple);box-shadow:0 0 8px var(--purple)}
.stat-dot.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.stat-label{font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em}
.stat-value{font-family:var(--font-mono);font-size:0.95rem;font-weight:600;color:var(--text-primary)}

/* SUBNAV */
.subnav{display:flex;gap:2px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:3px;margin-bottom:20px;overflow-x:auto}
.subnav-btn{font-family:var(--font-body);font-size:0.78rem;font-weight:500;color:var(--text-secondary);background:transparent;border:none;padding:8px 18px;border-radius:5px;cursor:pointer;transition:all .25s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.subnav-btn:hover{color:var(--text-primary);background:rgba(0,180,216,0.06)}
.subnav-btn.active{color:var(--hex-bright);background:rgba(0,180,216,0.12);font-weight:600}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:12px;padding:0 0 18px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:260px;max-width:500px}
.search-input{width:100%;background:var(--bg-input);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:11px 44px 11px 16px;color:var(--text-primary);font-family:var(--font-body);font-size:0.9rem;outline:none;transition:all .3s}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--hex);box-shadow:0 0 16px rgba(0,180,216,0.1)}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--hex-dim);font-size:1.1rem;pointer-events:none}
.search-hint{font-size:0.65rem;color:var(--text-dim);white-space:nowrap}

.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{font-family:var(--font-body);font-size:0.75rem;padding:6px 14px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:18px;color:var(--text-secondary);cursor:pointer;transition:all .25s;white-space:nowrap}
.filter-chip:hover{border-color:var(--border-hex);color:var(--text-primary)}
.filter-chip.active{background:rgba(0,180,216,0.12);border-color:var(--hex);color:var(--hex-bright)}

/* TIER BADGE */
.tier-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:4px;font-family:var(--font-display);font-size:0.85rem;font-weight:900;letter-spacing:0.04em;flex-shrink:0}
.tier-s{background:linear-gradient(135deg,#FF6B6B,#FFD166);color:#1a0a00;box-shadow:0 0 12px rgba(255,107,107,0.4)}
.tier-a{background:linear-gradient(135deg,#FFD166,#FFB347);color:#1a0a00;box-shadow:0 0 8px rgba(255,209,102,0.3)}
.tier-b{background:linear-gradient(135deg,#48CAE4,#00B4D8);color:#001a20;box-shadow:0 0 8px rgba(72,202,228,0.3)}
.tier-c{background:linear-gradient(135deg,#94A3B8,#64748B);color:#0a0a0a}
.tier-d{background:linear-gradient(135deg,#64748B,#475569);color:#0a0a0a}

/* CHAMPION GRID */
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.champ-card{position:relative;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
.champ-card:hover{transform:translateY(-3px);border-color:var(--border-hex);box-shadow:var(--shadow-hex),0 8px 25px rgba(0,0,0,.4);z-index:5;background:var(--bg-card-hover)}
.champ-card .img-wrap{position:relative;aspect-ratio:1;overflow:hidden;background:var(--bg-surface)}
.champ-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.champ-card:hover .img-wrap img{transform:scale(1.08)}
.champ-card .img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,var(--bg-card) 100%)}
.champ-card .card-tier{position:absolute;top:8px;right:8px;z-index:2}
.champ-card .card-body{padding:12px 14px;position:relative}
.champ-card .card-name{font-family:var(--font-chinese);font-size:0.95rem;font-weight:700;color:var(--text-primary);margin-bottom:1px}
.champ-card .card-en{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-dim);margin-bottom:4px}
.champ-card .card-roles{display:flex;gap:4px;flex-wrap:wrap}
.champ-card .card-role{font-size:0.62rem;padding:2px 8px;background:rgba(0,180,216,0.08);border:1px solid rgba(0,180,216,0.15);border-radius:10px;color:var(--hex-bright);letter-spacing:0.03em}

/* BUILD SECTION */
.build-layout{display:flex;gap:20px;flex-wrap:wrap}
.build-champ-select{width:280px;flex-shrink:0}
.build-champ-list{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);max-height:500px;overflow-y:auto}
.build-champ-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:all .2s;border-bottom:1px solid var(--border-subtle)}
.build-champ-item:hover{background:rgba(0,180,216,0.06)}
.build-champ-item.selected{background:rgba(0,180,216,0.1);border-left:3px solid var(--hex)}
.build-champ-item img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.build-champ-item .bci-name{font-family:var(--font-chinese);font-size:0.85rem;font-weight:600;color:var(--text-primary)}
.build-champ-item .bci-tier{margin-left:auto}

.build-detail{flex:1;min-width:350px}
.build-block{margin-bottom:20px}
.build-block-title{font-family:var(--font-chinese);font-size:0.9rem;font-weight:700;color:var(--hex-bright);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.build-block-title::before{content:'';display:inline-block;width:3px;height:16px;background:var(--hex);border-radius:2px}
.build-items{display:flex;flex-wrap:wrap;gap:8px}
.build-item-card{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);min-width:200px;transition:all .25s;cursor:pointer;flex:1}
.build-item-card:hover{border-color:var(--border-gold);box-shadow:var(--shadow-gold)}
.build-item-card.core{border-color:rgba(255,209,102,0.3);background:rgba(255,209,102,0.04)}
.build-item-card img{width:40px;height:40px;border-radius:4px;object-fit:contain;background:var(--bg-deep)}
.build-item-card .bic-name{font-size:0.8rem;font-weight:600;color:var(--text-primary)}
.build-item-card .bic-rating{display:flex;gap:1px;margin-top:2px}
.build-item-card .bic-star{font-size:0.6rem;color:var(--text-dim)}
.build-item-card .bic-star.on{color:var(--gold)}
.build-item-card .bic-tag{font-size:0.6rem;padding:2px 8px;border-radius:8px;margin-left:auto}
.build-item-card .bic-tag.core-tag{background:rgba(255,209,102,0.15);color:var(--gold);border:1px solid rgba(255,209,102,0.25)}

/* RUNES */
.rune-display{display:flex;gap:20px;flex-wrap:wrap}
.rune-tree{flex:1;min-width:200px;padding:18px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
.rune-tree.primary{border-left:3px solid var(--gold)}
.rune-tree.secondary{border-left:3px solid var(--hex)}
.rune-tree-title{font-family:var(--font-chinese);font-size:0.85rem;font-weight:700;margin-bottom:10px}
.rune-tree.primary .rune-tree-title{color:var(--gold)}
.rune-tree.secondary .rune-tree-title{color:var(--hex-bright)}
.rune-row{display:flex;gap:4px;margin-bottom:6px}
.rune-slot{width:32px;height:32px;border-radius:50%;background:var(--bg-deep);border:2px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;font-size:0.6rem;transition:all .2s}
.rune-slot.active{border-color:var(--hex);background:rgba(0,180,216,0.15)}
.rune-slot.keystone{width:40px;height:40px;border-color:var(--gold);box-shadow:0 0 10px rgba(255,209,102,0.2)}

/* AUGMENT GRID */
.augment-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.augment-card{padding:16px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);transition:all .3s;cursor:pointer}
.augment-card:hover{border-color:var(--border-hex);box-shadow:var(--shadow-hex)}
.augment-card.prismatic{border-left:3px solid #A855F7}
.augment-card.gold{border-left:3px solid var(--gold)}
.augment-card.silver{border-left:3px solid #94A3B8}
.augment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.augment-name{font-family:var(--font-chinese);font-size:0.85rem;font-weight:700;color:var(--text-primary)}
.augment-tier-tag{font-size:0.6rem;padding:3px 10px;border-radius:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
.augment-tier-tag.prismatic{background:rgba(168,85,247,0.15);color:#C084FC;border:1px solid rgba(168,85,247,0.3)}
.augment-tier-tag.gold{background:rgba(255,209,102,0.15);color:var(--gold);border:1px solid rgba(255,209,102,0.3)}
.augment-tier-tag.silver{background:rgba(148,163,184,0.12);color:#94A3B8;border:1px solid rgba(148,163,184,0.25)}
.augment-effect{font-size:0.75rem;color:var(--text-secondary);line-height:1.5}
.augment-set-tag{display:inline-block;margin-top:6px;font-size:0.6rem;padding:2px 8px;background:rgba(0,180,216,0.08);border-radius:8px;color:var(--hex-bright)}
.augment-hero-rating{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-subtle)}
.augment-hero-rating span{font-size:0.65rem;color:var(--text-dim)}

/* COMBO SECTION */
.combo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.combo-card{padding:20px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);transition:all .3s}
.combo-card:hover{border-color:var(--border-hex);box-shadow:var(--shadow-hex)}
.combo-title{font-family:var(--font-chinese);font-size:0.95rem;font-weight:700;color:var(--hex-bright);margin-bottom:6px}
.combo-augments{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.combo-aug-tag{font-size:0.65rem;padding:4px 10px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);border-radius:10px;color:#C084FC}
.combo-desc{font-size:0.78rem;color:var(--text-secondary);line-height:1.5}
.combo-heroes{font-size:0.68rem;color:var(--text-dim);margin-top:6px}

/* EXTERNAL LINKS */
.ext-links{display:flex;gap:10px;flex-wrap:wrap;padding:16px 0}
.ext-link{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);color:var(--text-secondary);text-decoration:none;font-size:0.8rem;transition:all .25s}
.ext-link:hover{border-color:var(--hex);color:var(--hex-bright);box-shadow:var(--shadow-hex)}
.ext-link svg{width:16px;height:16px;fill:currentColor}

/* SECTION */
.section{margin:4px 0 24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-chinese);font-size:1.05rem;font-weight:700;color:var(--text-primary);display:flex;align-items:center;gap:10px}
.section-count{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-dim);font-weight:400}

/* NO RESULTS */
.no-res{text-align:center;padding:50px 20px;grid-column:1/-1}
.no-res-icon{font-size:2.5rem;margin-bottom:12px}
.no-res-text{font-family:var(--font-chinese);color:var(--text-dim);font-size:0.9rem}

/* SELECTED CHAMP HERO */
.selected-hero{display:flex;align-items:center;gap:16px;padding:20px;background:var(--bg-card);border:1px solid var(--border-hex);border-radius:var(--radius-lg);margin-bottom:20px}
.selected-hero img{width:72px;height:72px;border-radius:50%;border:2px solid var(--hex);object-fit:cover}
.selected-hero .sh-info h3{font-family:var(--font-chinese);font-size:1.2rem;font-weight:700;color:var(--text-primary)}
.selected-hero .sh-info .sh-sub{font-size:0.78rem;color:var(--text-dim)}

/* TIER LIST VIEW */
.tier-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.tier-label{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:1rem;font-weight:900;flex-shrink:0}
.tier-label.s{background:linear-gradient(135deg,#EF476F,#FFD166);color:#1a0a00}
.tier-label.a{background:linear-gradient(135deg,#FFD166,#FFB347);color:#1a0a00}
.tier-label.b{background:#48CAE4;color:#001a20}
.tier-label.c{background:#94A3B8;color:#0a0a0a}
.tier-label.d{background:#64748B;color:#0a0a0a}
.tier-champs{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.tier-champ-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:16px;cursor:pointer;transition:all .2s;font-size:0.78rem}
.tier-champ-chip:hover{border-color:var(--border-hex);background:var(--bg-card-hover)}
.tier-champ-chip img{width:22px;height:22px;border-radius:50%}

/* FOOTER */
.footer{text-align:center;padding:36px 0 28px;border-top:1px solid var(--border-subtle);margin-top:24px}
.footer p{color:var(--text-dim);font-size:0.78rem}
.footer .ext-links{justify-content:center}

/* RESPONSIVE */
@media(max-width:768px){
  .app{padding:0 14px}
  .header{flex-direction:column;align-items:flex-start}
  .champ-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .augment-grid{grid-template-columns:1fr}
  .combo-grid{grid-template-columns:1fr}
  .build-layout{flex-direction:column}
  .build-champ-select{width:100%}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{max-width:none}
}
@media(max-width:480px){
  .champ-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
  .champ-card .card-body{padding:8px 10px}
  .champ-card .card-name{font-size:0.78rem}
  .mode-btn{padding:8px 12px;font-size:0.72rem}
  .subnav-btn{padding:6px 12px;font-size:0.7rem}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <div class="logo-hex">
        <svg viewBox="0 0 44 44"><polygon points="22,4 38,12 38,28 22,36 6,28 6,12" class="hex-path"/><polygon points="22,9 34,15 34,27 22,33 10,27 10,15" class="hex-path" opacity="0.4"/></svg>
      </div>
      <div class="logo-text"><h1>Runeterra Codex</h1><span>英雄联盟 · 战术信息宝典</span></div>
    </div>
    <div class="mode-switch" id="modeSwitch">
      <button class="mode-btn active" data-mode="ranked">🏟 峡谷排位</button>
      <button class="mode-btn" data-mode="aram">⚔ 海克斯乱斗</button>
    </div>

// Build search tokens for each champion
function buildSearchTokens(champId, zhName) {
  const entry = PINYIN[champId] || '';
  const tokens = new Set();
  tokens.add(champId.toLowerCase());
  tokens.add(zhName.toLowerCase());
  entry.split('_').forEach(t => { if(t.length>=2) tokens.add(t.toLowerCase()); });
  // Add first letters of pinyin words
  const pyParts = entry.split('_').filter(t => t.length>=2 && !/[一-鿿]/.test(t));
  if(pyParts.length>0) tokens.add(pyParts.map(p=>p[0]).join('').toLowerCase());
  return [...tokens];
}

// Tier color helper
function getTier(tier){return tier||'?'}
function getTierClass(tier){return 'tier-'+tier.toLowerCase()}

// Get champion meta (tier+builds+runes+summoners)
function getChampMeta(champId,tags){
  const ov=CHAMP_OVERRIDES[champId]||{};
  const role=tags[0]||'Fighter';
  const buildKey=ROLE_BUILD_KEY[role]||'Fighter';
  return {
    tier:{ranked:ov.tier?.ranked||getTierFromList(champId,RANKED_TIERS),aram:ov.tier?.aram||getTierFromList(champId,ARAM_TIERS)},
    builds:ov.builds||ROLE_BUILDS[buildKey]||ROLE_BUILDS.Fighter,
    runes:ov.runes||ROLE_RUNES[buildKey]||ROLE_RUNES.Fighter,
    summoners:ov.summoners||ROLE_SUMMONERS[buildKey]||ROLE_SUMMONERS.Fighter
  };
}
function getTierFromList(id,tiers){
  for(const[t,list]of Object.entries(tiers)){if(list.includes(id))return t}
  return 'B';
}

// ============ DATA LOADING ============
async function fetchJSON(url){const r=await fetch(url);if(!r.ok)throw Error(`HTTP ${r.status}`);return r.json()}

async function loadData(){
  try{
    // Fetch version first, then parallel load everything else
    const versions=await fetchJSON('https://ddragon.leagueoflegends.com/api/versions.json');
    S.version=versions[0];
    const cdn=`https://ddragon.leagueoflegends.com/cdn/${S.version}`;

    const[champData,itemData,runeData,summData]=await Promise.all([
      fetchJSON(`${cdn}/data/zh_CN/champion.json`),
      fetchJSON(`${cdn}/data/zh_CN/item.json`),
      fetchJSON(`${cdn}/data/zh_CN/runesReforged.json`),
      fetchJSON(`${cdn}/data/zh_CN/summoner.json`)
    ]);

    S.champions=champData.data;
    S.runes=runeData;
    S.summoners=summData.data;

    // Build champion list
    S.champList=Object.values(S.champions).map(c=>{
      const meta=getChampMeta(c.id,c.tags);
      return {
        id:c.id,key:c.key,name:c.name,title:c.title,blurb:c.blurb,tags:c.tags,
        partype:c.partype,info:c.info,image:`${cdn}/img/champion/${c.image.full}`,
        loading:`https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${c.id}_0.jpg`,
        tier:meta.tier,builds:meta.builds,runes:meta.runes,summoners:meta.summoners,
        searchTokens:buildSearchTokens(c.id,c.name)
      };
    });

    // Build item list
    S.itemList=Object.entries(itemData.data).filter(([_,i])=>i.gold.purchasable&&i.gold.total>=300&&!i.tags.includes('Consumable')&&!i.tags.includes('Trinket'))
      .map(([id,i])=>({id,name:i.name,description:i.plaintext||i.description.replace(/<[^>]*>/g,'').slice(0,100),gold:i.gold,
        image:`${cdn}/img/item/${id}.png`}))
      .sort((a,b)=>b.gold.total-a.gold.total);

    $('#statVersion').textContent=S.version;
    $('#statChamps').textContent=S.champList.length;
    renderAll();
  }catch(e){
    console.error('Data load failed:',e);
    $('#mainContent').innerHTML='<div class="no-res"><div class="no-res-icon">⚠</div><div class="no-res-text">数据加载失败，请检查网络连接后刷新页面</div></div>';
    $('#statVersion').textContent='加载失败';
  }
}

// ============ SEARCH ENGINE ============
function matchChamp(champ,query){
  if(!query)return true;
  const q=query.toLowerCase();
  return champ.searchTokens.some(t=>t.includes(q));
}
function filterChamps(){
  let list=S.champList;
  if(S.search)list=list.filter(c=>matchChamp(c,S.search));
  if(S.filter!=='all')list=list.filter(c=>c.tags.includes(S.filter));
  return list;
}

function renderTierGrid(mode){
  const tiers=mode==='ranked'?{S:[],A:[],B:[],C:[],D:[]}:{S:[],A:[],B:[],C:[],D:[]};
  const tierData=mode==='ranked'?RANKED_TIERS:ARAM_TIERS;
  const list=filterChamps();
  list.forEach(c=>{
    const t=getTierFromList(c.id,tierData);
    if(tiers[t])tiers[t].push(c);
  });

  let html='';
  for(const t of['S','A','B','C','D']){
    const champs=tiers[t]||[];
    if(champs.length===0&&t==='D')continue;
    html+=`<div class="tier-row"><div class="tier-label ${t.toLowerCase()}">${t}</div><div class="tier-champs">`;
    champs.forEach(c=>{
      html+=`<div class="tier-champ-chip" data-champ="${c.id}" onclick="window._selectChamp('${c.id}')">

        <span>${c.name}</span>

    html+=`</div></div>`;

  if(!list.length)html='<div class="no-res"><div class="no-res-icon">🔍</div><div class="no-res-text">未找到匹配的英雄</div></div>';

}

// ============ RENDER ALL ============
function renderAll(){
  renderSubNav();
  renderStatsBar();
  if(S.mode==='ranked'){
    if(S.tab==='tier')renderTierGrid('ranked');
    else if(S.tab==='build')renderBuildSection();
    else if(S.tab==='rune')renderRuneSection();
    else if(S.tab==='summoner')renderSummonerSection();
  }else{
    if(S.tab==='augment')renderAugmentSection();
    else if(S.tab==='build')renderBuildSection();
    else if(S.tab==='summoner')renderSummonerSection();
    else if(S.tab==='combo')renderComboSection();
  }
  bindEvents();
}

// ============ TAG LABEL ============
function tagLabel(t){const m={Assassin:'刺客',Fighter:'战士',Mage:'法师',Marksman:'射手',Support:'辅助',Tank:'坦克'};return m[t]||t}

// ============ EVENT BINDING ============
function bindEvents(){
  // Subnav tabs
  $$('#subNav .subnav-btn').forEach(b=>{b.onclick=()=>{S.tab=b.dataset.tab;renderAll()}});

  // Mode switch
  $$('#modeSwitch .mode-btn').forEach(b=>{b.onclick=()=>{
    S.mode=b.dataset.mode;S.tab=S.mode==='ranked'?'tier':'augment';S.filter='all';
    renderFilters();renderAll();
    $$('#modeSwitch .mode-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  }});

  // Filters
  $$('#filterGroup .filter-chip').forEach(c=>{c.onclick=()=>{S.filter=c.dataset.role;renderFilters();renderAll()}});

  // Search
  $('#searchInput').oninput=function(){S.search=this.value.trim();renderAll()};

  // Champion selection in build/rune/summoner views
  $$('.build-champ-item').forEach(item=>{item.onclick=()=>{S.selectedChamp=item.dataset.champ;renderAll()}});

  // Champion cards in tier/augment view
  $$('.champ-card').forEach(card=>{card.onclick=()=>{S.selectedChamp=card.dataset.champ;
    if(S.mode==='ranked')S.tab='build';else S.tab='build';renderAll()}});
}

// ============ GLOBAL FUNCTIONS ============
window._selectChamp=function(id){S.selectedChamp=id;
  if(S.mode==='ranked'){if(S.tab==='tier')S.tab='build'}else{if(S.tab==='augment')S.tab='build'}
  renderAll()};

// ============ EXTERNAL LINKS ============
function renderExtLinks(){
  const links=[
    {name:'101.qq.com',url:'https://101.qq.com/#/hero-rank-5v5?tier=200&queue=420',desc:'腾讯官方数据'},
    {name:'lolstats.gg',url:'https://lolstats.gg/zh',desc:'英雄统计'},
    {name:'esports.op.gg',url:'https://esports.op.gg/stats/champion?hl=zh_CN',desc:'电竞数据'},
    {name:'champsight.com',url:'https://champsight.com/zh-cn/',desc:'英雄洞察'},
    {name:'u.gg',url:'https://u.gg/',desc:'出装胜率'},
    {name:'op.gg',url:'https://op.gg/',desc:'韩服数据'},
    {name:'metasrc.com',url:'https://www.metasrc.com/lol/mayhem/na/26.9/tier-list/augments',desc:'ARAM增幅梯度'},
    {name:'blitz.gg',url:'https://blitz.gg/lol/aram-mayhem-augments',desc:'增幅推荐'}
  ];
  $('#extLinks').innerHTML=links.map(l=>
    `<a href="${l.url}" target="_blank" rel="noopener" class="ext-link">
      <svg viewBox="0 0 16 16"><path d="M3 2v2h8.586L2.293 13.293l1.414 1.414L13 5.414V14h2V2z"/></svg>
      <span><strong>${l.name}</strong> <span style="font-size:0.65rem;color:var(--text-dim)">${l.desc}</span></span>
    </a>`
  ).join('');
}

// ============ INIT ============
function init(){
  renderFilters();
  renderExtLinks();
  loadData();
}
init();
})();
</script>
